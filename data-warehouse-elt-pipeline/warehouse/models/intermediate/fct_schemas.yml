version: 2

models:
  - name: int_fct_events
    description: "Event-level fact table for e-commerce user interactions"
    columns:
      - name: event_id
        description: "Surrogate key for each event"
        tests:
          - not_null
          - unique
      - name: user_id
        tests:
          - not_null
      - name: event_timestamp
        tests:
          - not_null
      - name: event_type
        tests:
          - not_null
          - accepted_values:
              values: ['view', 'cart', 'purchase']
      - name: price
        tests:
          - not_null