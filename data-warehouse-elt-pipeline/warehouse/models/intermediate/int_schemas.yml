version: 2

models:
  - name: int_events
    description: "Event-level intermediate table for e-commerce user interactions"
    columns:
      - name: event_id
        description: "Surrogate key for each event"
        tests:
          - not_null
          - unique
      - name: user_id
        tests:
          - not_null
      - name: event_timestamp
        tests:
          - not_null
      - name: event_type
        tests:
          - not_null
          - accepted_values:
              values: ['view', 'cart', 'purchase']
      - name: price
        tests:
          - not_null
  
  - name: int_sessions
    description: "Session-level intermediate table for e-commerce user session metrics"
    columns:
      - name: session_id
        description: "Surrogate key for each session (use_id + user_session)"
        tests:
          - not_null
          - unique
      - name: user_id
        tests:
          - not_null
      - name: view_count
        tests:
          - not_null
      - name: cart_count
        tests:
          - not_null
      - name: purchase_count
        tests:
          - not_null

  - name: int_user_daily_activity
    description: "Users daily activity register"
    columns:
      - name: usr_daily_act_id
        tests:
          - not_null
          - unique
      - name: event_date
        tests:
          - not_null
      - name: events_count
        tests:
          - not_null
  
  - name: dim_date
    description: "Date Dimension Table using date_spine that provides a continuos sequence of days.
                  It ensure no gaps exist in time-series reporting, even on dates with no transactional activity"
  
  - name: dim_users
    description: "Derived from events. Users information gathered in its event logs.
                  Information may be incosistent."

  - name: dim_products
    description: "Derived from events. Products information gathered with user activities.
                  Attributes may be inconsistent across time."
      