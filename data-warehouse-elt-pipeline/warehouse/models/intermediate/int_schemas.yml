version: 2

models:
  - name: int_events
    description: "Event-level intermediate table for e-commerce user interactions"
    columns:
      - name: event_id
        description: "Surrogate key for each event"
        tests:
          - not_null
          - unique
      - name: user_id
        tests:
          - not_null
      - name: event_timestamp
        tests:
          - not_null
      - name: event_type
        tests:
          - not_null
          - accepted_values:
              values: ['view', 'cart', 'purchase']
      - name: price
        tests:
          - not_null
  
  - name: int_sessions
    description: "Session-level intermediate table for e-commerce user session metrics"
    columns:
      - name: session_id
        description: "Surrogate key for each session (use_id + user_session)"
        tests:
          - not_null
          - unique
      - name: user_id
        tests:
          - not_null
      - name: view_count
        tests:
          - not_null
      - name: cart_count
        tests:
          - not_null
      - name: purchase_count
        tests:
          - not_null